<!DOCTYPE html>
<html>
<head>
  <title>Pilih Kelas</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
      background: #0b2c33;
      color: white;
    }

    h2 {
      margin-top: 40px;
    }

    .btn {
      margin: 10px;
      padding: 15px 20px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      background: white;
    }
  </style>
</head>
<body>

<h2>Pilih Kelas</h2>

<button class="btn" onclick="pilihKelas(4)">Kelas 4</button>
<button class="btn" onclick="pilihKelas(5)">Kelas 5</button>
<button class="btn" onclick="pilihKelas(6)">Kelas 6</button>

<script>
function pilihKelas(kelas){
  localStorage.setItem("kelas", kelas);
  window.location.href = "semester.html";
}
</script>

</body>
</html>
