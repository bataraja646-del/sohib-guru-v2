<!DOCTYPE html>

  <title>Pilih Kelas</title>
</head>

<body style="background:#0b1f2a; color:white; text-align:center; font-family:Arial;">

  <h1>Pilih Kelas</h1>

  <button onclick="pilihKelas('Kelas 1')">Kelas 1</button><br><br>

  <script>
    function pilihKelas(nama) {

      window.location.href = "semester.html";
    }
  </script>

</body>
</html>
